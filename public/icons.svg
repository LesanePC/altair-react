<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  
  <!-- Иконка: деньги -->
  <symbol id="money" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M8 12h8" stroke="currentColor" stroke-width="1.5"/>
    <path d="M12 8v8" stroke="currentColor" stroke-width="1.5"/>
    <path d="M10 10c0-1.1.9-2 2-2s2 .9 2 2" stroke="currentColor" stroke-width="1.5"/>
    <path d="M10 14c0 1.1.9 2 2 2s2-.9 2-2" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- Иконка: звезда -->
  <symbol id="star" viewBox="0 0 24 24">
    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </symbol>

  <!-- Иконка: часы -->
  <symbol id="clock" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
    <polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- Иконка: локация -->
  <symbol id="location" viewBox="0 0 24 24">
    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

</svg>